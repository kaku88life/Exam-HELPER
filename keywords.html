<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>證券高業 — 高頻關鍵字視覺化</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
:root{--bg:#0a0f1a;--c1:#1a2332;--c2:#111827;--bl:#3b82f6;--cy:#06b6d4;--pu:#8b5cf6;--pk:#ec4899;--or:#f97316;--gn:#10b981;--rd:#ef4444;--yw:#fbbf24;--tx:#f1f5f9;--mt:#94a3b8;--bd:#334155}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans TC',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;padding:20px}
.wrap{max-width:1200px;margin:0 auto}
.hdr{text-align:center;padding:30px 20px;background:linear-gradient(135deg,var(--c1),var(--c2));border-radius:18px;border:1px solid var(--bd);margin-bottom:24px;position:relative;overflow:hidden}
.hdr::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--or),var(--yw),var(--gn),var(--cy),var(--bl),var(--pu))}
.hdr h1{font-size:1.8rem;font-weight:900;background:linear-gradient(135deg,var(--yw),var(--or));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.hdr p{color:var(--mt);font-size:.9em}
.tabs{display:flex;gap:8px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
.tab{padding:10px 28px;border:1px solid var(--bd);border-radius:10px;cursor:pointer;background:var(--c1);color:var(--mt);font-size:.95em;font-weight:600;transition:all .25s}
.tab:hover{border-color:var(--cy);color:var(--tx);transform:translateY(-1px)}
.tab.a{color:#fff;border-color:transparent;box-shadow:0 4px 15px rgba(0,0,0,.3)}
.tab[data-t="inv"].a{background:linear-gradient(135deg,#3b82f6,#06b6d4)}
.tab[data-t="fin"].a{background:linear-gradient(135deg,#8b5cf6,#ec4899)}
.tab[data-t="law"].a{background:linear-gradient(135deg,#f97316,#fbbf24)}
.tab[data-t="all"].a{background:linear-gradient(135deg,#10b981,#06b6d4)}
.panel{display:none}.panel.a{display:block}

/* Word cloud container */
.cloud-box{background:var(--c1);border-radius:16px;padding:28px;border:1px solid var(--bd);margin-bottom:20px;min-height:320px;position:relative;overflow:hidden}
.cloud-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.cloud-box.inv::before{background:linear-gradient(90deg,var(--bl),var(--cy))}
.cloud-box.fin::before{background:linear-gradient(90deg,var(--pu),var(--pk))}
.cloud-box.law::before{background:linear-gradient(90deg,var(--or),var(--yw))}
.cloud-box h2{font-size:1.2rem;font-weight:700;margin-bottom:18px;display:flex;align-items:center;gap:10px}
.cloud-box.inv h2{color:var(--cy)} .cloud-box.fin h2{color:var(--pu)} .cloud-box.law h2{color:var(--or)}
.badge{font-size:.65rem;padding:3px 10px;border-radius:14px;font-weight:500}
.b-bl{background:rgba(59,130,246,.2);color:var(--bl)}
.b-pu{background:rgba(139,92,246,.2);color:var(--pu)}
.b-or{background:rgba(249,115,22,.2);color:var(--or)}

/* Word cloud words */
.cloud{display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:center;padding:10px}
.word{display:inline-flex;align-items:center;padding:6px 14px;border-radius:20px;cursor:default;transition:all .2s;position:relative;font-weight:500}
.word:hover{transform:scale(1.08);z-index:2}
.word .cnt{font-size:.6em;opacity:.7;margin-left:5px;font-weight:400}

/* Size classes */
.w-xl{font-size:1.6rem;padding:10px 22px;font-weight:900}
.w-lg{font-size:1.25rem;padding:8px 18px;font-weight:700}
.w-md{font-size:1rem;padding:6px 14px}
.w-sm{font-size:.85rem;padding:5px 12px}
.w-xs{font-size:.75rem;padding:4px 10px;opacity:.85}

/* Color themes per subject */
.inv .w-xl{background:rgba(59,130,246,.25);color:#93c5fd;border:1px solid rgba(59,130,246,.4)}
.inv .w-lg{background:rgba(6,182,212,.2);color:#67e8f9;border:1px solid rgba(6,182,212,.3)}
.inv .w-md{background:rgba(59,130,246,.12);color:#93c5fd;border:1px solid rgba(59,130,246,.2)}
.inv .w-sm{background:rgba(6,182,212,.1);color:#a5f3fc;border:1px solid rgba(6,182,212,.15)}
.inv .w-xs{background:rgba(59,130,246,.06);color:var(--mt);border:1px solid var(--bd)}

.fin .w-xl{background:rgba(139,92,246,.25);color:#c4b5fd;border:1px solid rgba(139,92,246,.4)}
.fin .w-lg{background:rgba(236,72,153,.2);color:#f9a8d4;border:1px solid rgba(236,72,153,.3)}
.fin .w-md{background:rgba(139,92,246,.12);color:#c4b5fd;border:1px solid rgba(139,92,246,.2)}
.fin .w-sm{background:rgba(236,72,153,.1);color:#fbcfe8;border:1px solid rgba(236,72,153,.15)}
.fin .w-xs{background:rgba(139,92,246,.06);color:var(--mt);border:1px solid var(--bd)}

.law .w-xl{background:rgba(249,115,22,.25);color:#fdba74;border:1px solid rgba(249,115,22,.4)}
.law .w-lg{background:rgba(251,191,36,.2);color:#fde68a;border:1px solid rgba(251,191,36,.3)}
.law .w-md{background:rgba(249,115,22,.12);color:#fdba74;border:1px solid rgba(249,115,22,.2)}
.law .w-sm{background:rgba(251,191,36,.1);color:#fef08a;border:1px solid rgba(251,191,36,.15)}
.law .w-xs{background:rgba(249,115,22,.06);color:var(--mt);border:1px solid var(--bd)}

/* Bar chart section */
.bar-section{background:var(--c1);border-radius:16px;padding:24px;border:1px solid var(--bd);margin-bottom:20px}
.bar-section h3{font-size:1em;font-weight:700;margin-bottom:16px;color:var(--cy)}
.bar-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid rgba(51,65,85,.5)}
.bar-row:last-child{border-bottom:none}
.bar-rank{width:24px;text-align:center;font-weight:900;font-size:.85em}
.bar-rank.r1{color:var(--yw)}.bar-rank.r2{color:var(--mt)}.bar-rank.r3{color:#cd7f32}
.bar-label{width:140px;font-size:.88em;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:22px;background:var(--bg);border-radius:6px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:6px;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-size:.72em;font-weight:700;color:#fff;min-width:30px;transition:width .6s ease}
.bar-fill.inv{background:linear-gradient(90deg,var(--bl),var(--cy))}
.bar-fill.fin{background:linear-gradient(90deg,var(--pu),var(--pk))}
.bar-fill.law{background:linear-gradient(90deg,var(--or),var(--yw))}
.bar-cnt{width:45px;text-align:right;font-size:.82em;color:var(--mt);font-weight:600}

/* Bubble chart */
.bubble-wrap{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;padding:15px}
.bubble{border-radius:50%;display:flex;align-items:center;justify-content:center;text-align:center;font-weight:700;cursor:default;transition:all .2s;line-height:1.2}
.bubble:hover{transform:scale(1.1);z-index:2}
.bubble span{font-size:.55em;opacity:.7;display:block;font-weight:400}

/* Legend */
.legend{display:flex;gap:16px;justify-content:center;margin:10px 0 16px;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:5px;font-size:.8em;color:var(--mt)}
.leg-dot{width:10px;height:10px;border-radius:50%}

/* Footer */
.footer{text-align:center;margin-top:20px;padding:14px;background:var(--c2);border-radius:10px;color:var(--mt);font-size:.82em}
.back-link{display:inline-block;margin-top:8px;color:var(--cy);text-decoration:none;font-weight:600}
.back-link:hover{text-decoration:underline}

@media(max-width:768px){
  .bar-label{width:100px;font-size:.8em}
  .cloud{gap:5px}
  .w-xl{font-size:1.3rem} .w-lg{font-size:1.05rem}
}
/* ── Desktop: slides shown normally ── */
.carousel{position:relative}
.carousel-track{display:block}
.carousel-slide{display:block}
/* Desktop: bar + bubble side by side */
.carousel-slide:nth-child(2),.carousel-slide:nth-child(3){display:inline-block;width:calc(50% - 9px);vertical-align:top}
.carousel-slide:nth-child(2){margin-right:14px}
.carousel-dots{display:none;justify-content:center;gap:8px;padding:12px 0}
.carousel-dots .dot{width:10px;height:10px;border-radius:50%;background:var(--bd);cursor:pointer;transition:all .2s}
.carousel-dots .dot.a{background:var(--cy);transform:scale(1.2)}
.slide-label{display:none;text-align:center;font-size:.75em;color:var(--mt);margin-top:-4px;margin-bottom:8px}

@media(max-width:600px){
  body{padding:8px}
  .hdr{padding:16px 12px;border-radius:12px;margin-bottom:14px}
  .hdr h1{font-size:1.3rem}
  .hdr p{font-size:.78em;margin-top:6px}
  .tabs{gap:4px;margin-bottom:12px}
  .tab{padding:7px 12px;font-size:.78em;border-radius:8px}
  .cloud-box{padding:16px 10px;border-radius:10px;margin-bottom:12px;min-height:auto}
  .cloud-box h2{font-size:.95rem;margin-bottom:10px}
  .cloud{gap:4px;padding:4px}
  .w-xl{font-size:1rem!important;padding:5px 10px!important;font-weight:800!important}
  .w-lg{font-size:.85rem!important;padding:4px 9px!important}
  .w-md{font-size:.75rem!important;padding:3px 7px!important}
  .w-sm{font-size:.66rem!important;padding:3px 6px!important}
  .w-xs{font-size:.58rem!important;padding:2px 5px!important}
  .word .cnt{font-size:.55em!important;margin-left:3px}
  .bar-section{padding:16px 12px;border-radius:10px;margin-bottom:0}
  .bar-section h3{font-size:.9em;margin-bottom:10px}
  .bar-label{width:68px;font-size:.72em}
  .bar-cnt{font-size:.72em;width:40px}
  .bar-rank{font-size:.78em}
  .bar-fill{font-size:.62em}
  .bubble-wrap{padding:8px;gap:6px}
  .badge{font-size:.55rem;padding:2px 7px}
  .back-link{font-size:.82em}
  .legend{gap:8px;margin:6px 0 12px}
  .leg-item{font-size:.72em}

  /* Carousel active on mobile */
  .carousel{overflow:hidden}
  .carousel-track{display:flex!important;transition:transform .35s ease}
  .carousel-slide{min-width:100%!important;flex-shrink:0;display:block!important;width:100%!important;margin-right:0!important}
  .carousel-dots{display:flex}
  .slide-label{display:block}
}
</style>
</head>

function showTab(t){
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('a',b.dataset.t===t));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('a'));
  document.getElementById('p-'+t).classList.add('a');
}

function sizeClass(v, max){
  const r=v/max;
  if(r>=0.7) return 'w-xl';
  if(r>=0.45) return 'w-lg';
  if(r>=0.25) return 'w-md';
  if(r>=0.12) return 'w-sm';
  return 'w-xs';
}

function renderCloud(container, data, cls){
  if(!data.length) return;
  const max=data[0].v;
  // Shuffle for visual variety but keep size ordering
  const shuffled=[...data].sort(()=>Math.random()-0.5);
  let h='';
  shuffled.forEach(d=>{
    const sc=sizeClass(d.v,max);
    h+=`<div class="word ${sc}" title="${d.k}: ${d.v}次">${d.k}<span class="cnt">${d.v}</span></div>`;
  });
  container.innerHTML=h;
}

function renderBars(container, data, cls, n=15){
  const top=data.slice(0,n);
  const max=top[0]?.v||1;
  let h='';
  top.forEach((d,i)=>{
    const rc=i<1?'r1':i<2?'r2':i<3?'r3':'';
    const pct=Math.round(d.v/max*100);
    h+=`<div class="bar-row">
      <div class="bar-rank ${rc}">${i+1}</div>
      <div class="bar-label">${d.k}</div>
      <div class="bar-track"><div class="bar-fill ${cls}" style="width:${pct}%">${d.v}</div></div>
      <div class="bar-cnt">${d.v}題</div>
    </div>`;
  });
  container.innerHTML=h;
}

function renderBubbles(container, data, colors, n=20){
  const top=data.slice(0,n);
  const max=top[0]?.v||1;
  let h='';
  top.forEach((d,i)=>{
    const r=d.v/max;
    const size=Math.round(50+r*80);
    const ci=i%colors.length;
    const fs=Math.round(9+r*8);
    h+=`<div class="bubble" style="width:${size}px;height:${size}px;background:${colors[ci]};font-size:${fs}px" title="${d.k}: ${d.v}次">${d.k}<span>${d.v}</span></div>`;
  });
  container.innerHTML=h;
}

    <div class="cloud-box fin"><h2>財務分析 關鍵字雲 <span class="badge b-pu">${KW.fin.length} 個關鍵字</span></h2><div class="cloud" id="cloud-fin-all"></div></div>
    <div class="cloud-box law"><h2>法規實務 關鍵字雲 <span class="badge b-or">${KW.law.length} 個關鍵字</span></h2><div class="cloud" id="cloud-law-all"></div></div>
  `;
  renderCloud(document.getElementById('cloud-inv-all'), KW.inv, 'inv');
  renderCloud(document.getElementById('cloud-fin-all'), KW.fin, 'fin');
  renderCloud(document.getElementById('cloud-law-all'), KW.law, 'law');
})();

// --- Individual subject tabs ---
function buildSubjectTab(id, data, cls, title, badgeCls, colors){
  const el=document.getElementById('p-'+id);
  el.innerHTML=`
    <div class="carousel" id="carousel-${id}">
      <div class="carousel-track">
        <div class="carousel-slide">
          <div class="cloud-box ${cls}"><h2>${title} 關鍵字雲 <span class="badge ${badgeCls}">${data.length} 個</span></h2><div class="cloud" id="cloud-${id}"></div></div>
        </div>
        <div class="carousel-slide">
          <div class="bar-section"><h3>出題頻率 TOP 15</h3><div id="bars-${id}"></div></div>
        </div>
        <div class="carousel-slide">
          <div class="bar-section"><h3>高頻關鍵字氣泡圖</h3><div class="bubble-wrap" id="bub-${id}"></div></div>
        </div>
      </div>
      <div class="slide-label" id="slabel-${id}">關鍵字雲</div>
      <div class="carousel-dots" id="dots-${id}">
        <div class="dot a" data-i="0"></div>
        <div class="dot" data-i="1"></div>
        <div class="dot" data-i="2"></div>
      </div>
    </div>
  `;
  renderCloud(document.getElementById('cloud-'+id), data, cls);
  renderBars(document.getElementById('bars-'+id), data, cls);
  renderBubbles(document.getElementById('bub-'+id), data, colors);
  initCarousel(id);
}

const slideNames=['關鍵字雲','出題頻率 TOP 15','氣泡圖'];
function isMobile(){return window.innerWidth<=600;}
function initCarousel(id){
  const wrap=document.getElementById('carousel-'+id);
  const track=wrap.querySelector('.carousel-track');
  const dots=wrap.querySelectorAll('.dot');
  const label=document.getElementById('slabel-'+id);
  let cur=0, startX=0, dragging=false;

  function goTo(i){
    if(!isMobile()){track.style.transform='';return;}
    cur=Math.max(0,Math.min(2,i));
    track.style.transform='translateX(-'+(cur*100)+'%)';
    dots.forEach((d,j)=>d.classList.toggle('a',j===cur));
    label.textContent=slideNames[cur];
  }
  dots.forEach(d=>d.addEventListener('click',()=>goTo(+d.dataset.i)));

  // Touch swipe
  track.addEventListener('touchstart',e=>{startX=e.touches[0].clientX;dragging=true;},{passive:true});
  track.addEventListener('touchend',e=>{
    if(!dragging)return;dragging=false;
    const dx=e.changedTouches[0].clientX-startX;
    if(Math.abs(dx)>40){goTo(cur+(dx<0?1:-1));}
  },{passive:true});

  // Reset on resize
  window.addEventListener('resize',()=>{if(!isMobile())track.style.transform='';});
}

const invColors=['rgba(59,130,246,.5)','rgba(6,182,212,.5)','rgba(59,130,246,.35)','rgba(6,182,212,.35)','rgba(99,102,241,.4)'];
const finColors=['rgba(139,92,246,.5)','rgba(236,72,153,.45)','rgba(139,92,246,.35)','rgba(236,72,153,.3)','rgba(167,139,250,.4)'];
const lawColors=['rgba(249,115,22,.5)','rgba(251,191,36,.45)','rgba(249,115,22,.35)','rgba(251,191,36,.3)','rgba(234,179,8,.4)'];

buildSubjectTab('inv', KW.inv, 'inv', '投資學', 'b-bl', invColors);
buildSubjectTab('fin', KW.fin, 'fin', '財務分析', 'b-pu', finColors);
buildSubjectTab('law', KW.law, 'law', '法規實務', 'b-or', lawColors);
