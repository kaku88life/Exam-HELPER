<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>證券高業 考前衝刺包</title>
<style>
:root{--bg:#0f172a;--sf:#1e293b;--cd:#334155;--tx:#e2e8f0;--mt:#94a3b8;--cy:#22d3ee;--gn:#4ade80;--vi:#a78bfa;--yw:#facc15}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans TC','Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;display:flex;align-items:center;justify-content:center}
.wrap{max-width:520px;width:100%;padding:24px}
h1{font-size:1.6em;text-align:center;margin-bottom:8px;background:linear-gradient(135deg,var(--cy),var(--vi));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{text-align:center;color:var(--mt);font-size:.85em;margin-bottom:28px}
.card{display:block;background:var(--sf);border:2px solid var(--cd);border-radius:12px;padding:20px;margin-bottom:14px;text-decoration:none;color:var(--tx);transition:all .2s}
.card:hover{border-color:var(--cy);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.card h2{font-size:1.1em;margin-bottom:4px}
.card p{font-size:.8em;color:var(--mt);line-height:1.5}
.card .icon{font-size:1.5em;float:left;margin-right:12px;margin-top:2px}
.tag{display:inline-block;font-size:.65em;padding:2px 8px;border-radius:4px;margin-left:6px;vertical-align:middle}
.t1{background:rgba(34,211,238,.15);color:var(--cy)}
.t2{background:rgba(74,222,128,.15);color:var(--gn)}
.t3{background:rgba(250,204,21,.15);color:var(--yw)}
.foot{text-align:center;margin-top:20px;font-size:.72em;color:var(--cd)}
</style>
</head>
<body>
<div class="wrap">
<h1>證券高業 考前衝刺包</h1>

<a class="card" href="dashboard.html">
<span class="icon">📊</span>
<h2>題庫分析儀表板 <span class="tag t1">966 題</span></h2>
<p>各科主題分布、章節熱點、高頻考點、必背公式、讀書筆記一站式總覽</p>
</a>

<a class="card" href="mock-exam.html">
<span class="icon">📝</span>

</a>

<a class="card" href="keywords.html">
<span class="icon">🔍</span>
<h2>高頻關鍵字 <span class="tag t3">視覺化</span></h2>

</a>

<div class="foot">Built with Claude Code | Data: 證基會考古題 + JY筆記 V9.6.0</div>
</div>
</body>
</html>
