<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>證券高業 模擬考</title>
<style>
:root{--bg:#0f172a;--sf:#1e293b;--cd:#334155;--bd:#475569;--tx:#e2e8f0;--mt:#94a3b8;
--cy:#22d3ee;--gn:#4ade80;--yw:#facc15;--rd:#f87171;--or:#fb923c;--vi:#a78bfa;--pk:#f472b6}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans TC','Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
.wrap{max-width:800px;margin:0 auto;padding:16px}

/* Header */
.hdr{text-align:center;padding:24px 0 16px}
.hdr h1{font-size:1.5em;background:linear-gradient(135deg,var(--cy),var(--vi));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr p{color:var(--mt);font-size:.85em;margin-top:4px}

/* Setup screen */
.setup{background:var(--sf);border-radius:12px;padding:24px;margin:16px 0}
.setup h2{font-size:1.1em;margin-bottom:16px;color:var(--cy)}
.subj-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px}
.subj-btn{background:var(--cd);border:2px solid var(--bd);border-radius:10px;padding:16px 12px;text-align:center;cursor:pointer;transition:all .2s}
.subj-btn:hover{border-color:var(--cy);transform:translateY(-2px)}
.subj-btn.sel{border-color:var(--cy);background:rgba(34,211,238,.1)}
.subj-btn .sn{font-size:1em;font-weight:600;display:block}
.subj-btn .sd{font-size:.75em;color:var(--mt);margin-top:4px}
.subj-btn .sq{font-size:.7em;color:var(--gn);margin-top:2px}
.start-btn{display:block;width:100%;padding:14px;border:none;border-radius:8px;background:linear-gradient(135deg,var(--cy),var(--vi));color:var(--bg);font-size:1.1em;font-weight:700;cursor:pointer;transition:opacity .2s;margin-top:8px}
.start-btn:hover{opacity:.9}
.start-btn:disabled{opacity:.4;cursor:not-allowed}

/* Exam screen */
.exam{display:none}
.top-bar{display:flex;justify-content:space-between;align-items:center;background:var(--sf);border-radius:10px;padding:12px 16px;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.timer{font-size:1.2em;font-weight:700;font-variant-numeric:tabular-nums}
.timer.warn{color:var(--yw);animation:pulse 1s infinite}
.timer.danger{color:var(--rd);animation:pulse .5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.progress{font-size:.85em;color:var(--mt)}
.prog-bar{width:100%;height:6px;background:var(--cd);border-radius:3px;margin-top:6px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--cy),var(--gn));border-radius:3px;transition:width .3s}

/* Question card */
.q-card{background:var(--sf);border-radius:12px;padding:24px;margin:12px 0}
.q-num{font-size:.8em;color:var(--cy);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.q-src{font-size:.7em;padding:2px 8px;border-radius:10px;background:var(--cd);color:var(--mt)}
.q-stem{font-size:1em;line-height:1.7;margin-bottom:16px;white-space:pre-wrap}
.opts{display:flex;flex-direction:column;gap:8px}
.opt{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;background:var(--cd);border:2px solid transparent;border-radius:8px;cursor:pointer;transition:all .15s;line-height:1.5}
.opt:hover{border-color:var(--cy);background:rgba(34,211,238,.06)}
.opt.picked{border-color:var(--cy);background:rgba(34,211,238,.12)}
.opt.correct{border-color:var(--gn);background:rgba(74,222,128,.12)}
.opt.wrong{border-color:var(--rd);background:rgba(248,113,113,.12)}
.opt .ol{font-weight:700;color:var(--cy);min-width:24px;flex-shrink:0}
.opt.correct .ol{color:var(--gn)}.opt.wrong .ol{color:var(--rd)}

/* Navigation */
.nav-row{display:flex;gap:8px;margin:16px 0;flex-wrap:wrap}
.nav-btn{flex:1;padding:12px;border:2px solid var(--bd);border-radius:8px;background:var(--sf);color:var(--tx);font-size:.9em;cursor:pointer;transition:all .15s;min-width:80px;text-align:center}
.nav-btn:hover{border-color:var(--cy)}
.nav-btn.primary{background:linear-gradient(135deg,var(--cy),var(--vi));color:var(--bg);border-color:transparent;font-weight:600}
.nav-btn:disabled{opacity:.3;cursor:not-allowed}
.mark-btn{border-color:var(--yw);color:var(--yw)}
.mark-btn.marked{background:rgba(250,204,21,.15)}
.submit-btn{border-color:var(--gn);color:var(--gn)}

/* Question map */
.q-map{display:flex;flex-wrap:wrap;gap:4px;margin:12px 0;justify-content:center}
.q-dot{width:30px;height:30px;border-radius:6px;background:var(--cd);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:.7em;cursor:pointer;transition:all .15s}
.q-dot:hover{border-color:var(--cy)}
.q-dot.cur{border-color:var(--cy);box-shadow:0 0 8px rgba(34,211,238,.3)}
.q-dot.ans{background:rgba(34,211,238,.2);border-color:var(--cy)}
.q-dot.mkd{background:rgba(250,204,21,.2);border-color:var(--yw);color:var(--yw)}

/* Result screen */
.result{display:none}
.score-card{background:var(--sf);border-radius:16px;padding:32px;text-align:center;margin:16px 0}
.score-num{font-size:3em;font-weight:800;margin:12px 0}
.score-num.pass{background:linear-gradient(135deg,var(--gn),var(--cy));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.score-num.fail{background:linear-gradient(135deg,var(--rd),var(--or));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.score-detail{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:16px}
.sd-item{background:var(--cd);border-radius:8px;padding:12px}
.sd-item .sl{font-size:.75em;color:var(--mt)}
.sd-item .sv{font-size:1.3em;font-weight:700;margin-top:4px}

/* Review */
.review-section{margin:20px 0}
.review-section h3{font-size:1em;color:var(--yw);margin-bottom:12px}
.r-card{background:var(--sf);border-radius:10px;padding:16px;margin-bottom:10px;border-left:3px solid var(--rd)}
.r-card.r-correct{border-left-color:var(--gn)}
.r-stem{font-size:.9em;line-height:1.6;margin-bottom:8px}
.r-opts{font-size:.82em;color:var(--mt);line-height:1.6}
.r-ans{font-size:.8em;margin-top:6px}
.r-ans .your{color:var(--rd);font-weight:600}
.r-ans .right{color:var(--gn);font-weight:600}

/* History */
.history{background:var(--sf);border-radius:12px;padding:20px;margin:16px 0}
.history h3{font-size:1em;color:var(--vi);margin-bottom:12px}
.h-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--cd);font-size:.85em}
.h-row:last-child{border-bottom:none}
.h-score{font-weight:700}
.h-score.pass{color:var(--gn)}.h-score.fail{color:var(--rd)}
.no-hist{color:var(--mt);font-size:.85em;text-align:center;padding:12px}

/* Tabs for review filter */
.tab-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.tab-btn{padding:6px 14px;border-radius:6px;background:var(--cd);border:1px solid var(--bd);color:var(--mt);font-size:.8em;cursor:pointer}
.tab-btn:hover{border-color:var(--cy)}
.tab-btn.act{background:rgba(34,211,238,.15);border-color:var(--cy);color:var(--cy)}

/* Footer */
.foot{text-align:center;padding:24px 0;font-size:.75em;color:var(--bd)}
.foot a{color:var(--cy);text-decoration:none}

/* Mobile */
@media(max-width:480px){
.wrap{padding:10px}
.hdr h1{font-size:1.2em}
.subj-grid{grid-template-columns:1fr;gap:8px}
.subj-btn{padding:12px}
.q-card{padding:16px}
.q-stem{font-size:.9em}
.opt{padding:10px 12px;font-size:.88em}
.top-bar{padding:10px 12px}
.timer{font-size:1em}
.nav-btn{padding:10px;font-size:.82em;min-width:60px}
.q-dot{width:26px;height:26px;font-size:.65em}
.score-num{font-size:2.4em}
.score-detail{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div class="wrap">
<div class="hdr">
<h1>證券高業 模擬考</h1>
<p>考試日期：2026/04/21 | 每科 50 題，70 分及格</p>
</div>

<!-- Setup Screen -->
<div class="setup" id="setupScreen">
<h2>選擇考科</h2>
<div class="subj-grid" id="subjGrid"></div>
<div class="history" id="historyBox"><h3>歷史紀錄</h3><div id="histList"></div></div>
<button class="start-btn" id="startBtn" disabled>開始模擬考</button>
</div>

<!-- Exam Screen -->
<div class="exam" id="examScreen">
<div class="top-bar">
<div>
<div class="timer" id="timer">60:00</div>
<div class="progress"><span id="progText">1 / 50</span></div>
</div>
<div style="flex:1;max-width:200px">
<div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
</div>
<div style="font-size:.8em;color:var(--mt)" id="subjLabel"></div>
</div>
<div class="q-map" id="qMap"></div>
<div class="q-card" id="qCard">
<div class="q-num"><span id="qNum"></span><span class="q-src" id="qSrc"></span></div>
<div class="q-stem" id="qStem"></div>
<div class="opts" id="qOpts"></div>
</div>
<div class="nav-row">
<button class="nav-btn" id="prevBtn" disabled>上一題</button>
<button class="nav-btn mark-btn" id="markBtn">標記</button>
<button class="nav-btn primary" id="nextBtn">下一題</button>
<button class="nav-btn submit-btn" id="submitBtn">交卷</button>
</div>
</div>

<!-- Result Screen -->
<div class="result" id="resultScreen">
<div class="score-card">
<div style="font-size:.9em;color:var(--mt)" id="resSubj"></div>
<div class="score-num" id="resScore">0</div>
<div style="font-size:.85em;color:var(--mt)" id="resVerdict"></div>
<div class="score-detail" id="resDetail"></div>
</div>
<div class="review-section">
<h3 id="reviewTitle">作答回顧</h3>
<div class="tab-row" id="reviewTabs"></div>
<div id="reviewList"></div>
</div>
<div class="nav-row" style="justify-content:center">
<button class="nav-btn primary" onclick="backToSetup()" style="max-width:240px">返回選科</button>
</div>
</div>

<div class="foot">
<a href="dashboard.html">題庫分析</a> &nbsp;|&nbsp;
<a href="keywords.html">關鍵字分析</a>
</div>
</div>

// ── Shuffle & pick ──
function shuffle(arr){
var a=arr.slice();
for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}
return a;
}

function startExam(){
if(!selSubj)return;
var pool=ALL_Q.filter(function(q){return q.subject===selSubj});
var n=Math.min(INFO.subjects[selSubj].questions, pool.length);
curQs=shuffle(pool).slice(0,n);
curIdx=0;answers={};marks={};examDone=false;

// Timer
var mins=INFO.subjects[selSubj].time_min;
timeLeft=mins*60;

document.getElementById('setupScreen').style.display='none';
document.getElementById('resultScreen').style.display='none';
document.getElementById('examScreen').style.display='block';
document.getElementById('subjLabel').textContent=selSubj;

buildMap();
renderQ();
startTimer();
}

// ── Timer ──
function startTimer(){

function updateTimerDisplay(){
var m=Math.floor(timeLeft/60),s=timeLeft%60;

}
function autoSubmit(){if(!examDone)finishExam();}

document.getElementById('progText').textContent=(curIdx+1)+' / '+curQs.length;
document.getElementById('progFill').style.width=((curIdx+1)/curQs.length*100)+'%';

var opts=document.getElementById('qOpts');
opts.innerHTML='';
['A','B','C','D'].forEach(function(L){
var d=document.createElement('div');
d.className='opt'+(answers[curIdx]===L?' picked':'');
d.innerHTML='<span class="ol">('+L+')</span><span>'+q[L]+'</span>';
d.onclick=function(){
if(examDone)return;
answers[curIdx]=L;
document.querySelectorAll('.opt').forEach(function(o){o.classList.remove('picked')});
d.classList.add('picked');
updateMap();
};
opts.appendChild(d);
});

// Nav buttons
document.getElementById('prevBtn').disabled=(curIdx===0);
document.getElementById('nextBtn').textContent=(curIdx===curQs.length-1)?'最後一題':'下一題';
var mb=document.getElementById('markBtn');
mb.className='nav-btn mark-btn'+(marks[curIdx]?' marked':'');
mb.textContent=marks[curIdx]?'取消標記':'標記';
updateMap();
}

function goTo(i){curIdx=i;renderQ();}

document.getElementById('prevBtn').onclick=function(){if(curIdx>0){curIdx--;renderQ();}};
document.getElementById('nextBtn').onclick=function(){if(curIdx<curQs.length-1){curIdx++;renderQ();}};
document.getElementById('markBtn').onclick=function(){marks[curIdx]=!marks[curIdx];renderQ();};
document.getElementById('submitBtn').onclick=function(){
var unanswered=curQs.length-Object.keys(answers).length;
var markedCount=Object.keys(marks).filter(function(k){return marks[k]}).length;
var msg='確定交卷？';
if(unanswered>0)msg+='\n\n尚有 '+unanswered+' 題未作答';
if(markedCount>0)msg+='\n有 '+markedCount+' 題標記待確認';
if(confirm(msg))finishExam();
};
document.getElementById('startBtn').onclick=startExam;

// ── Finish & Score ──
function finishExam(){
examDone=true;
clearInterval(timerID);

var correct=0, wrong=[], skipped=[];
curQs.forEach(function(q,i){
if(answers[i]==null){skipped.push(i);return;}
if(answers[i]===q.answer){correct++;}
else{wrong.push(i);}
});

var total=curQs.length;
var score=Math.round(correct/total*100);
var pass=score>=INFO.pass_score;

// Save history
saveHistory(selSubj, score, correct, total, wrong.length, skipped.length);

// Show result
document.getElementById('examScreen').style.display='none';
document.getElementById('resultScreen').style.display='block';
document.getElementById('resSubj').textContent=selSubj+' 模擬考結果';
var sn=document.getElementById('resScore');
sn.textContent=score+' 分';
sn.className='score-num '+(pass?'pass':'fail');
document.getElementById('resVerdict').textContent=pass?'恭喜通過！':'未達及格標準，繼續加油！';

var usedTime=INFO.subjects[selSubj].time_min*60-timeLeft;
var um=Math.floor(usedTime/60),us=usedTime%60;

document.getElementById('resDetail').innerHTML=
'<div class="sd-item"><div class="sl">答對</div><div class="sv" style="color:var(--gn)">'+correct+'</div></div>'+
'<div class="sd-item"><div class="sl">答錯</div><div class="sv" style="color:var(--rd)">'+wrong.length+'</div></div>'+
'<div class="sd-item"><div class="sl">未答</div><div class="sv" style="color:var(--yw)">'+skipped.length+'</div></div>'+
'<div class="sd-item"><div class="sl">用時</div><div class="sv">'+um+'m'+us+'s</div></div>'+
'<div class="sd-item"><div class="sl">正確率</div><div class="sv">'+(total>0?Math.round(correct/total*100):0)+'%</div></div>'+
'<div class="sd-item"><div class="sl">及格線</div><div class="sv">'+INFO.pass_score+'分</div></div>';

// Review
buildReview(wrong, skipped);
}

function buildReview(wrong, skipped){
var tabs=document.getElementById('reviewTabs');
var list=document.getElementById('reviewList');

var wrongSet=new Set(wrong);
var skipSet=new Set(skipped);

function render(filter){
list.innerHTML='';
curQs.forEach(function(q,i){
var userAns=answers[i];
var isCorrect=(userAns===q.answer);
var isSkip=(userAns==null);
if(filter==='wrong'&&(isCorrect||isSkip))return;
if(filter==='skip'&&!isSkip)return;
if(filter==='correct'&&!isCorrect)return;

var card=document.createElement('div');
card.className='r-card'+(isCorrect?' r-correct':'');
card.innerHTML='<div class="r-stem">'+(i+1)+'. '+escHtml(q.stem)+'</div>'+
'<div class="r-opts">'+['A','B','C','D'].map(function(L){
var cls='';
if(L===q.answer)cls=' style="color:var(--gn);font-weight:600"';
else if(L===userAns&&!isCorrect)cls=' style="color:var(--rd);text-decoration:line-through"';
return '<div'+cls+'>('+L+') '+escHtml(q[L])+'</div>';
}).join('')+'</div>'+
'<div class="r-ans">'+(isSkip?'<span class="your">未作答</span>':'<span class="your">你的答案：('+userAns+')</span>')+' &nbsp; <span class="right">正確：('+q.answer+')</span></div>';
list.appendChild(card);
});
if(!list.children.length)list.innerHTML='<div style="color:var(--mt);text-align:center;padding:16px">無題目</div>';
}

tabs.innerHTML='';
[['all','全部'],['wrong','答錯 ('+wrong.length+')'],['skip','未答 ('+skipped.length+')'],['correct','答對']].forEach(function(p){
var b=document.createElement('button');
b.className='tab-btn'+(p[0]==='wrong'?' act':'');
b.textContent=p[1];
b.onclick=function(){
tabs.querySelectorAll('.tab-btn').forEach(function(t){t.classList.remove('act')});
b.classList.add('act');
render(p[0]);
};
tabs.appendChild(b);
});

render('wrong');
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── History (localStorage) ──
var HIST_KEY='mock_exam_history';
function getHistory(){try{return JSON.parse(localStorage.getItem(HIST_KEY))||[];}catch(e){return[];}}
function saveHistory(subj,score,correct,total,wrong,skip){
var h=getHistory();
h.unshift({subj:subj,score:score,correct:correct,total:total,wrong:wrong,skip:skip,date:new Date().toLocaleString('zh-TW')});
if(h.length>20)h=h.slice(0,20);
localStorage.setItem(HIST_KEY,JSON.stringify(h));
}
function loadHistory(){
var h=getHistory();
var el=document.getElementById('histList');
if(!h.length){el.innerHTML='<div class="no-hist">尚無考試紀錄</div>';return;}
el.innerHTML=h.slice(0,8).map(function(r){
return '<div class="h-row"><span>'+r.subj+' ('+r.date+')</span><span class="h-score '+(r.score>=INFO.pass_score?'pass':'fail')+'">'+r.score+'分 ('+r.correct+'/'+r.total+')</span></div>';
}).join('');
}

function backToSetup(){
document.getElementById('resultScreen').style.display='none';
document.getElementById('examScreen').style.display='none';
document.getElementById('setupScreen').style.display='block';
selSubj=null;
document.querySelectorAll('.subj-btn').forEach(function(b){b.classList.remove('sel')});
document.getElementById('startBtn').disabled=true;
loadHistory();
}

// ── Init ──
initSetup();
</script>
</body>
</html>
