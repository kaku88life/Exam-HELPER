<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>證券高業 kaku Holdings 衝刺圖</title>
<style>
:root{
  --bg:#f5f7f3;
  --surface:#ffffff;
  --surface-2:#eef3ef;
  --ink:#17211d;
  --muted:#66736d;
  --line:#d7ded8;
  --teal:#087a73;
  --blue:#315f94;
  --amber:#b66516;
  --rose:#9a4a62;
  --olive:#607243;
  --danger:#b84a42;
  --shadow:0 16px 42px rgba(23,33,29,.12);
}
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:"Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;
  letter-spacing:0;
  overflow:hidden;
}
button,input{font:inherit}
.app{height:100%;display:grid;grid-template-rows:auto minmax(0,1fr)}
.topbar{
  display:grid;
  grid-template-columns:minmax(220px,1fr) auto minmax(220px,360px) auto;
  gap:14px;
  align-items:center;
  padding:12px 18px;
  border-bottom:1px solid var(--line);
  background:rgba(255,255,255,.9);
  backdrop-filter:blur(18px);
}
.brand h1{margin:0;font-size:21px;line-height:1.2;font-weight:800}
.brand p{margin:4px 0 0;color:var(--muted);font-size:13px;line-height:1.35}
.seg,.modes{display:inline-flex;gap:4px;padding:4px;border:1px solid var(--line);border-radius:8px;background:var(--surface-2)}
.seg button,.modes button,.tool-link,.clear-btn,.mark-btn{
  border:0;
  min-height:34px;
  border-radius:6px;
  padding:0 12px;
  color:var(--muted);
  background:transparent;
  cursor:pointer;
  white-space:nowrap;
}
.seg button.active,.modes button.active{
  color:#fff;
  background:var(--ink);
}
.search{position:relative;min-width:0}
.search input{
  width:100%;
  height:40px;
  border:1px solid var(--line);
  border-radius:8px;
  padding:0 40px 0 12px;
  background:var(--surface);
  color:var(--ink);
  outline:none;
}
.search input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(8,122,115,.12)}
.clear-btn{
  position:absolute;
  right:4px;
  top:4px;
  width:32px;
  padding:0;
}
.links{display:flex;gap:8px;justify-content:flex-end}
.tool-link{
  display:inline-flex;
  align-items:center;
  border:1px solid var(--line);
  background:var(--surface);
  color:var(--ink);
  text-decoration:none;
}
.workspace{min-height:0;position:relative}
.view{display:none;height:100%;min-height:0}
.view.active{display:grid}
#graphView{grid-template-columns:minmax(0,1fr) 390px}
.graph-stage{position:relative;min-width:0;min-height:0;background:linear-gradient(180deg,#fbfcfa,#eef3ef)}
#graphCanvas{display:block;width:100%;height:100%;touch-action:none;cursor:grab}
#graphCanvas.dragging{cursor:grabbing}
.floating{
  position:absolute;
  left:16px;
  bottom:16px;
  display:flex;
  gap:8px;
  align-items:center;
  flex-wrap:wrap;
  max-width:calc(100% - 32px);
}
.pill{
  border:1px solid var(--line);
  border-radius:999px;
  padding:6px 10px;
  background:rgba(255,255,255,.88);
  color:var(--muted);
  font-size:12px;
}
.inspector{
  min-height:0;
  overflow:auto;
  border-left:1px solid var(--line);
  background:var(--surface);
  padding:18px;
}
.eyebrow{color:var(--teal);font-size:12px;font-weight:800;letter-spacing:0;text-transform:uppercase}
.panel-title{margin:4px 0 8px;font-size:25px;line-height:1.2}
.panel-sub{margin:0 0 14px;color:var(--muted);line-height:1.6;font-size:14px}
.meta-row{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0 16px}
.tag{
  display:inline-flex;
  align-items:center;
  min-height:24px;
  border-radius:999px;
  padding:0 9px;
  background:var(--surface-2);
  color:var(--muted);
  font-size:12px;
  font-weight:700;
}
.tag.teal{background:rgba(8,122,115,.1);color:var(--teal)}
.tag.amber{background:rgba(182,101,22,.12);color:var(--amber)}
.tag.rose{background:rgba(154,74,98,.12);color:var(--rose)}
.section{
  border-top:1px solid var(--line);
  padding-top:14px;
  margin-top:14px;
}
.section h3{margin:0 0 9px;font-size:14px;color:var(--ink)}
.formula{
  border-left:4px solid var(--teal);
  background:#f8faf7;
  padding:12px;
  border-radius:0 8px 8px 0;
  font-family:"Cascadia Mono","Consolas",monospace;
  font-size:14px;
  line-height:1.55;
}
.case-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.metric{
  border:1px solid var(--line);
  border-radius:8px;
  padding:10px;
  background:#fbfcfa;
}
.metric span{display:block;color:var(--muted);font-size:12px}
.metric strong{display:block;margin-top:3px;font-size:17px}
.text-list{margin:0;padding:0;list-style:none}
.text-list li{
  padding:8px 0;
  border-bottom:1px solid rgba(215,222,216,.7);
  color:var(--muted);
  line-height:1.55;
  font-size:14px;
}
.text-list li:last-child{border-bottom:0}
.question{
  border:1px solid var(--line);
  border-radius:8px;
  padding:12px;
  background:#fbfcfa;
  line-height:1.55;
  font-size:14px;
}
.question b{color:var(--ink)}
.mark-btn{
  width:100%;
  margin-top:12px;
  border:1px solid var(--line);
  background:var(--surface-2);
  color:var(--ink);
}
.mark-btn.active{background:rgba(8,122,115,.12);border-color:var(--teal);color:var(--teal);font-weight:800}
#mindView{grid-template-columns:minmax(0,1fr) 390px}
.mind-area{
  min-width:0;
  min-height:0;
  overflow:auto;
  padding:20px;
}
.mind-header{
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:12px;
  margin-bottom:16px;
}
.mind-header h2{margin:0;font-size:24px}
.mind-header p{margin:4px 0 0;color:var(--muted);font-size:14px}
.mind-grid{display:block;max-width:980px}
.mind-subject{margin-bottom:18px}
.mind-subject>summary,.mind-chapter>summary,.mind-term>summary{list-style:none;cursor:pointer}
.mind-subject>summary::-webkit-details-marker,.mind-chapter>summary::-webkit-details-marker,.mind-term>summary::-webkit-details-marker{display:none}
.mind-subject-title{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  border-radius:10px;
  padding:13px 15px;
  color:#fff;
  background:var(--teal);
  box-shadow:0 12px 28px rgba(23,33,29,.09);
}
.mind-subject-title strong{font-size:18px}
.mind-subject-title span{font-size:12px;opacity:.9}
.mind-subject[data-type="investment"] .mind-subject-title{background:#6d5a95}
.mind-subject[data-type="finance"] .mind-subject-title{background:#087a73}
.mind-subject[data-type="law"] .mind-subject-title{background:#9a4a62}
.mind-branch{
  position:relative;
  margin-left:18px;
  padding-left:22px;
  border-left:2px solid rgba(23,33,29,.12);
}
.mind-chapter{margin:12px 0}
.mind-chapter>summary,.mind-term>summary{position:relative}
.mind-chapter>summary::before,.mind-term>summary::before{
  content:"";
  position:absolute;
  left:-22px;
  top:50%;
  width:18px;
  height:1px;
  background:rgba(23,33,29,.18);
}
.mind-term>summary::before{left:-18px;width:14px;background:rgba(23,33,29,.14)}
.chapter-node{
  display:grid;
  grid-template-columns:minmax(0,1fr) auto;
  gap:10px;
  align-items:center;
  border:1px solid var(--line);
  border-radius:10px;
  padding:11px 13px;
  background:rgba(255,255,255,.9);
}
.chapter-node strong,.term-node strong{display:block;line-height:1.35}
.chapter-node span,.term-node span{display:block;margin-top:3px;color:var(--muted);font-size:12px;line-height:1.35}
.term-list{
  margin-left:18px;
  padding-left:20px;
  border-left:1px solid rgba(23,33,29,.14);
}
.mind-term{margin:10px 0}
.term-node{
  display:grid;
  grid-template-columns:auto minmax(0,1fr) auto;
  gap:10px;
  align-items:center;
  border:1px solid rgba(23,33,29,.1);
  border-radius:10px;
  padding:10px 12px;
  background:rgba(255,255,255,.84);
}
.term-node:hover,.term-node.active{border-color:var(--teal);background:rgba(8,122,115,.08)}
.term-node.important{
  border-color:rgba(8,122,115,.35);
  background:linear-gradient(90deg,rgba(8,122,115,.12),rgba(255,255,255,.9) 38%);
  box-shadow:inset 4px 0 0 rgba(8,122,115,.68);
}
.term-dot{width:12px;height:12px;border-radius:50%;background:var(--teal)}
.term-dot.investment{background:#6d5a95}
.term-dot.finance{background:#607243}
.term-dot.formula{background:#b66516}
.term-dot.law{background:#9a4a62}
.term-badges{display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.important-mark,.freq-mark{
  display:inline-flex;
  align-items:center;
  min-height:23px;
  border-radius:999px;
  padding:3px 8px;
  color:var(--teal);
  background:rgba(8,122,115,.1);
  font-size:12px;
  font-weight:800;
  white-space:nowrap;
}
.freq-mark{color:var(--muted);background:var(--surface-2);font-weight:700}
.question-branch{
  margin:8px 0 0 22px;
  padding-left:18px;
  border-left:1px dashed rgba(23,33,29,.2);
}
.question-node{
  margin:8px 0;
  border:1px solid rgba(23,33,29,.1);
  border-radius:9px;
  padding:10px 12px;
  background:rgba(255,255,255,.72);
  font-size:13px;
  line-height:1.55;
}
.question-node strong{display:block;margin-bottom:4px}
.question-node span{color:var(--muted)}
.hidden{display:none!important}
@media(max-width:980px){
  body{overflow:auto}
  .app{min-height:100%;height:auto}
  .topbar{grid-template-columns:1fr;align-items:stretch}
  .seg,.modes,.links{justify-content:flex-start;overflow-x:auto}
  #graphView,#mindView{grid-template-columns:1fr;height:auto}
  .graph-stage{height:62svh;min-height:430px}
  .floating{top:10px;bottom:auto}
  .inspector{border-left:0;border-top:1px solid var(--line)}
  .mind-branch{margin-left:12px;padding-left:18px}
  .term-list{margin-left:12px;padding-left:16px}
  .mind-chapter>summary::before{left:-18px;width:14px}
  .mind-term>summary::before{left:-16px;width:12px}
}
@media(max-width:560px){
  .case-grid{grid-template-columns:1fr}
  .brand h1{font-size:18px}
  .panel-title{font-size:21px}
  .seg button,.modes button,.tool-link{padding:0 10px;font-size:13px}
}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <h1>證券高業 三科關聯圖</h1>
      <p>以投資學、財務分析、證券法規三科為中心，串起會考關鍵字、公式與跨科題型。</p>
    </div>
    <div class="seg" aria-label="檢視切換">
      <button class="active" data-view="graph">關聯圖</button>
      <button data-view="mind">心智圖</button>
    </div>
    <div class="search">
      <input id="searchInput" type="search" placeholder="搜尋：損益表、存貨、CAPM 資本資產定價模型、債券、承銷">
      <button class="clear-btn" id="clearSearch" aria-label="清除搜尋">X</button>
    </div>
    <div class="links">
      <a class="tool-link" href="dashboard.html">完整題庫</a>
      <a class="tool-link" href="mock-exam.html">模擬考</a>
    </div>
  </header>
  <main class="workspace">
    <section class="view active" id="graphView">
      <div class="graph-stage">
        <canvas id="graphCanvas"></canvas>
        <div class="floating">
          <div class="modes" aria-label="圖層篩選">
            <button class="active" data-mode="all">三科總覽</button>
            <button data-mode="investment">投資學</button>
            <button data-mode="finance">財務分析</button>
            <button data-mode="law">證券法規</button>
          </div>
          <span class="pill" id="nodeCount">0 個節點</span>
          <span class="pill">拖曳節點，滾輪縮放</span>
        </div>
      </div>
      <aside class="inspector" id="graphPanel"></aside>
    </section>
    <section class="view" id="mindView">
      <div class="mind-area">
        <div class="mind-header">
          <div>
            <h2>心智圖模式</h2>
            <p>只留公式、案例、考題問法與易混陷阱。</p>
          </div>
          <div class="modes" aria-label="心智圖篩選">
            <button class="active" data-mind-filter="all">全部</button>
            <button data-mind-filter="investment">投資學</button>
            <button data-mind-filter="finance">財務分析</button>
            <button data-mind-filter="law">證券法規</button>
          </div>
        </div>
        <div class="mind-grid" id="mindGrid"></div>
      </div>
      <aside class="inspector" id="mindPanel"></aside>
    </section>
  </main>
</div>
<script>
const formatNT = value => "NT$" + Math.round(value).toLocaleString("zh-TW");

const companyMetrics = {
  totalAssets: 11421619,
  totalLiabilities: 8113287,
  equity: 3308332,
  currentAssets: 2221619,
  currentLiabilities: 1591963,
  propertyValue: 7760000,
  propertyLoan: 6208000,
  monthlyRent: 21000,
  monthlyMortgage: 28000,
  propertyCapRate: "2.83%",
  propertyDscr: "1.28x",
  takoyakiBeginningInventory: 30000,
  takoyakiPurchases: 90000,
  takoyakiEndingInventory: 25000,
  takoyakiSales: 180000
};
companyMetrics.takoyakiCogs = companyMetrics.takoyakiBeginningInventory + companyMetrics.takoyakiPurchases - companyMetrics.takoyakiEndingInventory;
companyMetrics.takoyakiGrossProfit = companyMetrics.takoyakiSales - companyMetrics.takoyakiCogs;
companyMetrics.takoyakiGrossMargin = Math.round(companyMetrics.takoyakiGrossProfit / companyMetrics.takoyakiSales * 1000) / 10 + "%";

const groups = {
  subject:{label:"科目中心",color:"#087a73"},
  statement:{label:"會計三表",color:"#315f94"},
  formula:{label:"公式與比率",color:"#b66516"},
  finance:{label:"財務分析考點",color:"#607243"},
  investment:{label:"投資學考點",color:"#6d5a95"},
  law:{label:"證券法規考點",color:"#9a4a62"}
};

const cards = {
  financeSubject:{
    title:"財務分析",
    group:"科目中心",
    subtitle:"以會計三表、認列分類、財務比率與現金流量為主軸。",
    formula:"資產 = 負債 + 權益；淨利 = 收入 - 成本 - 費用",
    plain:"看到財務分析題，先判斷它是在考分類、認列時點、公式計算，還是三表連動。",
    caseText:"kaku Holdings 只當例子：資產、負債、Amy 股東權益、jikka.app 費用、章魚燒存貨都放進三表裡理解。",
    metrics:[
      ["官方題庫","186 題"],
      ["分析題庫","304 題"],
      ["優先核心","會計三表"],
      ["常見題型","分類 / 公式 / 影響"]
    ],
    asks:["三表各自回答什麼問題？","題目給一筆交易時，要影響哪張表？"],
    solveSteps:["先判斷表別：資產負債表、損益表或現金流量表。","再判斷項目：資產、負債、權益、收入、成本或費用。","最後套公式或判斷對比率的方向。"],
    traps:["不要把收入等同現金流入。","不要把費用等同負債，未付款才可能產生應付。"],
    question:"財務分析常把『三表分類』與『比率變動』合在同一題，先回到表別與公式。"
  },
  investSubject:{
    title:"投資學",
    group:"科目中心",
    subtitle:"以基本分析、風險報酬、債券、ETF、選擇權與技術分析為主軸。",
    formula:"預期報酬 = 無風險利率 + Beta（貝它係數）× 市場風險溢酬",
    plain:"投資學的題目常把工具特性、公式計算與市場情境混合考。",
    caseText:"kaku Holdings 的股票投資部位可拿來練基本分析、風險報酬、ETF 與債券配置。",
    metrics:[
      ["官方題庫","237 題"],
      ["分析題庫","352 題"],
      ["高頻核心","投資工具 / 總經"],
      ["公式密度","高"]
    ],
    asks:["這題是在考投資工具、評價公式，還是風險衡量？","題目是否有給利率、Beta（貝它係數）、股利、殖利率等公式線索？"],
    solveSteps:["先抓投資工具：股票、債券、ETF（指數股票型基金）、權證或期貨。","再找公式變數：報酬、風險、利率、到期日、Beta（貝它係數）。","最後檢查選項是否混淆方向，例如利率上升與債券價格下跌。"],
    traps:["Beta（貝它係數）只衡量系統風險，不是總風險。","ETF（指數股票型基金）溢價與折價的套利方向很容易反。"],
    question:"代表題：變異數及 Beta（貝它係數）都可衡量風險，差別在 Beta 只衡量系統風險，變異數衡量總風險。"
  },
  lawSubject:{
    title:"證券法規",
    group:"科目中心",
    subtitle:"以承銷募集、公司法、證券商管理、內線交易、融資融券與投信投顧為主軸。",
    formula:"法規題先抓：主體、行為、期限、比例、主管機關",
    plain:"證券法規不是只背條文，而是把題目中的人、事、時間與限制拆出來。",
    caseText:"若 kaku Holdings 募資、發債、公開發行或有重大消息，就能套入承銷、公司法與內線交易題型。",
    metrics:[
      ["官方題庫","222 題"],
      ["分析題庫","334 題"],
      ["最高頻","承銷募集"],
      ["常見題型","何者錯誤 / 期限比例"]
    ],
    asks:["題目主體是發行公司、證券商、投信投顧，還是內部人？","考的是申報、禁止、例外，還是責任？"],
    solveSteps:["圈出主體與行為。","標記數字：期限、比例、金額、人數。","最後看選項是否偷換公開募集、私募、承銷或信用交易規則。"],
    traps:["法規題常考『何者不是』，方向要先看清楚。","公開發行、募集、承銷、私募不能混成同一件事。"],
    question:"代表題：違反內線交易規定時，損害賠償會用消息公開後十個營業日收盤平均價格作為比較基準。"
  },
  balance:{
    title:"資產負債表",
    group:"會計三表",
    subtitle:"某一個時點的財務狀況：資產、負債與權益。",
    formula:"資產 = 負債 + 權益",
    plain:"資產負債表題多半在考分類、資產成本、負債到期日與股東權益。",
    caseText:"股票與現金偏流動資產，不動產偏非流動資產；房貸是負債；Amy 投入或累積盈餘屬股東權益。",
    metrics:[
      ["總資產",formatNT(companyMetrics.totalAssets)],
      ["總負債",formatNT(companyMetrics.totalLiabilities)],
      ["股東權益",formatNT(companyMetrics.equity)],
      ["考法","分類題最多"]
    ],
    asks:["哪些項目屬於流動資產？","不可辨認無形資產與可辨認無形資產怎麼分？"],

function visibleNode(node){
  const q = query.trim().toLowerCase();
  const byMode = mode === "all" || node.layer === mode || node.group === "subject";
  if(!byMode) return false;
  if(!q) return true;
  const card = cards[node.id] || {};
  return [node.label,card.title,card.subtitle,card.formula,card.caseText,(card.asks||[]).join(" "),(card.traps||[]).join(" ")].join(" ").toLowerCase().includes(q);
}

function defaultNodeForMode(){
  if(mode === "investment") return "investSubject";
  if(mode === "law") return "lawSubject";
  return "financeSubject";
}

function resize(){
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = Math.max(1, Math.floor(rect.width * dpr));
  canvas.height = Math.max(1, Math.floor(rect.height * dpr));
  ctx.setTransform(dpr,0,0,dpr,0,0);
  if(!nodes.some(n=>n.x || n.y)) layout();
  draw();
}

function layout(){
  const rect = canvas.getBoundingClientRect();
  const cx = rect.width/2;
  const cy = rect.height/2;
  const compact = rect.width < 640;
  const sx = compact ? .6 : 1;
  const sy = compact ? .9 : 1;
  const p = (dx,dy)=>[cx + dx*sx, cy + dy*sy];
  const positions = {
    financeSubject:p(0,25),
    investSubject:p(-245,-45),
    lawSubject:p(245,-45),
    balance:p(-150,150),
    income:p(0,170),
    cashflow:p(150,150),
    inventory:p(-95,280),
    grossMargin:p(85,280),
    currentRatio:p(-220,255),
    quickRatio:p(-340,255),
    debtRatio:p(220,255),
    roe:p(340,255),
    property:p(0,320),
    basicAnalysis:p(-350,-155),
    riskReturn:p(-390,-25),
    bonds:p(-340,120),
    derivatives:p(-235,-205),
    technicalAnalysis:p(-425,-145),
    macroIndicators:p(-430,95),
    underwriting:p(350,-155),
    companyLaw:p(385,-25),
    insider:p(320,85),
    marginTrading:p(235,-205),
    securitiesDealer:p(425,-145),
    investmentTrust:p(430,95)
  };
  nodes.forEach(n=>{
    const p = positions[n.id] || [cx,cy];
    n.x = p[0];
    n.y = p[1];
  });
}

function toScreen(x,y){return {x:x*scale+offsetX,y:y*scale+offsetY}}
function toWorld(x,y){return {x:(x-offsetX)/scale,y:(y-offsetY)/scale}}

function draw(){
  const rect = canvas.getBoundingClientRect();
  ctx.clearRect(0,0,rect.width,rect.height);
  const visible = nodes.filter(visibleNode);
  const visibleIds = new Set(visible.map(n=>n.id));
  nodeCount.textContent = visible.length + " 個節點";
  ctx.lineCap = "round";

  links.forEach(link=>{
    if(!visibleIds.has(link.source) || !visibleIds.has(link.target)) return;
    const a = nodeById.get(link.source);
    const b = nodeById.get(link.target);
    const pa = toScreen(a.x,a.y);
    const pb = toScreen(b.x,b.y);
    const selected = selectedId === link.source || selectedId === link.target;
    ctx.strokeStyle = selected ? "rgba(8,122,115,.55)" : "rgba(23,33,29,.13)";
    ctx.lineWidth = selected ? 2.4 : 1.4;
    ctx.beginPath();
    ctx.moveTo(pa.x,pa.y);
    ctx.lineTo(pb.x,pb.y);
    ctx.stroke();
  });

  visible.forEach(node=>{
    const p = toScreen(node.x,node.y);
    const selected = node.id === selectedId;
    const color = groups[node.group].color;
    const radius = node.r * (selected ? 1.12 : 1) * scale;
    ctx.beginPath();
    ctx.arc(p.x,p.y,radius+7,0,Math.PI*2);
    ctx.fillStyle = selected ? "rgba(8,122,115,.14)" : "rgba(255,255,255,.65)";
    ctx.fill();
    ctx.beginPath();
    ctx.arc(p.x,p.y,radius,0,Math.PI*2);
    ctx.fillStyle = color;
    ctx.fill();
    ctx.lineWidth = mastered.has(node.id) ? 4 : 2;
    ctx.strokeStyle = mastered.has(node.id) ? "#17211d" : "rgba(255,255,255,.88)";
    ctx.stroke();
    ctx.fillStyle = "#17211d";
    ctx.font = "700 13px 'Noto Sans TC','Microsoft JhengHei',sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "top";
    const labelY = p.y + radius + 9;
    const words = labelLines(node.label);
    words.forEach((line,i)=>{
      ctx.fillText(line,p.x,labelY+i*17);
    });
  });
}

function labelLines(label){
  if(label === "ETF 與衍生商品") return ["ETF","衍生商品"];
  if(label === "銷貨成本與毛利率") return ["銷貨成本","毛利率"];
  if(label === "總體經濟指標") return ["總體經濟","指標"];
  if(label === "投信投顧法規") return ["投信投顧","法規"];
  if(label.length <= 8) return [label];
  return [label.slice(0,8),label.slice(8)];
}

function hitTest(clientX,clientY){
  const rect = canvas.getBoundingClientRect();
  const p = toWorld(clientX-rect.left, clientY-rect.top);
  const visible = nodes.filter(visibleNode).slice().reverse();
  return visible.find(node=>{
    const dx = p.x-node.x;
    const dy = p.y-node.y;
    return Math.sqrt(dx*dx+dy*dy) <= node.r + 12;
  }) || null;
}

function renderMind(){
  const activeFilter = document.querySelector("[data-mind-filter].active")?.dataset.mindFilter || "all";
  const visibleSubjects = mindData
    .filter(subject=>activeFilter==="all" || subject.type===activeFilter)
    .map(subject=>{
      const sections = subject.sections
        .map(section=>{
          const sectionHit = matchesMindText([section.title,section.summary]);
          const terms = section.terms.filter(id=>sectionHit || matchesMindTerm(id));
          return {...section,terms};
        })
        .filter(section=>section.terms.length);
      return {...subject,sections};
    })
    .filter(subject=>subject.sections.length);

  mindGrid.innerHTML = visibleSubjects.length ? visibleSubjects.map(subject=>`
    <details class="mind-subject" data-type="${subject.type}" open>
      <summary>
        <div class="mind-subject-title">
          <strong>${subject.title}</strong>
          <span>${subject.count}</span>
        </div>
      </summary>
      <div class="mind-branch">
        ${subject.sections.map(section=>`
          <details class="mind-chapter" open>
            <summary>
              <div class="chapter-node">
                <div>
                  <strong>${section.title}</strong>
                  <span>${section.summary}</span>
                </div>
                <span class="freq-mark">${section.terms.length} 個名詞</span>
              </div>
            </summary>
            <div class="term-list">

          </details>

      </div>

  mindGrid.querySelectorAll("[data-term-id]").forEach(node=>{
    node.addEventListener("click",()=>{
      const term = mindTermCards[node.dataset.termId];
      selectedMindTermId = node.dataset.termId;
      if(term?.nodeId) selectedId = term.nodeId;
      renderMindTermPanel();
      renderMind();
      draw();
    });
  });
}

function matchesMindText(parts){
  const q = query.trim().toLowerCase();
  if(!q) return false;
  return parts.join(" ").toLowerCase().includes(q);
}

function matchesMindTerm(id){
  const q = query.trim().toLowerCase();
  if(!q) return true;
  const term = mindTermCards[id];
  if(!term) return false;
  return [
    term.title,term.group,term.formula,term.plain,term.caseText,term.question,
    ...(term.asks||[]),...(term.solveSteps||[]),...(term.traps||[])
  ].join(" ").toLowerCase().includes(q);
}

function renderMindTermNode(id,type){
  const term = mindTermCards[id];
  if(!term) return "";
  const active = id === selectedMindTermId ? " active" : "";
  const important = term.importance === "必背" ? " important" : "";
  const masteredClass = mastered.has("mind:"+id) ? " 已掌握" : term.importance;
  return `
    <details class="mind-term" ${active ? "open" : ""}>
      <summary data-term-id="${id}">
        <div class="term-node${active}${important}">
          <span class="term-dot ${type}"></span>
          <div>
            <strong>${term.title}</strong>
            <span>${term.formula}</span>
          </div>
          <div class="term-badges">
            <span class="important-mark">${masteredClass}</span>
            <span class="freq-mark">${term.freq}</span>
          </div>
        </div>
      </summary>
      <div class="question-branch">
        <div class="question-node">
          <strong>代表考法</strong>
          <span>${term.question}</span>
        </div>
      </div>
    </details>
  `;
}

  const metrics = (term.metrics || []).map(([k,v])=>`<div class="metric"><span>${k}</span><strong>${v}</strong></div>`).join("");
  const asks = (term.asks || []).map(x=>`<li>${x}</li>`).join("");
  const steps = (term.solveSteps || []).map(x=>`<li>${x}</li>`).join("");
  const traps = (term.traps || []).map(x=>`<li>${x}</li>`).join("");
  mindPanel.innerHTML = `
    <div class="eyebrow">心智圖細項</div>
    <h2 class="panel-title">${term.title}</h2>
    <p class="panel-sub">${term.subtitle}</p>
    <div class="meta-row">${tags}</div>
    <div class="section">
      <h3>公式或定義</h3>
      <div class="formula">${term.formula}</div>
      <ul class="text-list"><li>${term.plain}</li></ul>
    </div>
    <div class="section">
      <h3>考法拆解</h3>
      <ul class="text-list">${asks}</ul>
    </div>
    <div class="section">
      <h3>解題步驟</h3>
      <ul class="text-list">${steps}</ul>
    </div>
    <div class="section">
      <h3>kaku Holdings 案例備註</h3>
      <p class="panel-sub">${term.caseText}</p>
      <div class="case-grid">${metrics}</div>
    </div>
    <div class="section">
      <h3>常見陷阱</h3>
      <ul class="text-list">${traps}</ul>
    </div>
    <div class="section">
      <h3>代表考題</h3>
      <div class="question"><b>題庫方向：</b>${term.question}</div>
      <button class="mark-btn ${mastered.has(key) ? "active" : ""}" id="mindMasterBtn">${mastered.has(key) ? "取消已掌握" : "標記已掌握"}</button>
    </div>
  `;
  mindPanel.querySelector("#mindMasterBtn").addEventListener("click",()=>{
    if(mastered.has(key)) mastered.delete(key);
    else mastered.add(key);
    saveMastered();
    renderMindTermPanel();
    renderMind();
  });
}

canvas.addEventListener("pointerdown",event=>{
  const hit = hitTest(event.clientX,event.clientY);
  canvas.setPointerCapture(event.pointerId);
  const rect = canvas.getBoundingClientRect();
  lastPoint = {x:event.clientX-rect.left,y:event.clientY-rect.top};
  if(hit){
    selectedId = hit.id;
    draggingNode = hit;
    renderPanel(graphPanel);
    renderMindTermPanel();
    renderMind();
    draw();
  }else{
    draggingStage = true;
  }
  canvas.classList.add("dragging");
});

canvas.addEventListener("pointermove",event=>{
  if(!lastPoint) return;
  const rect = canvas.getBoundingClientRect();
  const point = {x:event.clientX-rect.left,y:event.clientY-rect.top};
  const dx = point.x - lastPoint.x;
  const dy = point.y - lastPoint.y;
  if(draggingNode){
    draggingNode.x += dx/scale;
    draggingNode.y += dy/scale;
  }else if(draggingStage){
    offsetX += dx;
    offsetY += dy;
  }
  lastPoint = point;
  draw();
});

canvas.addEventListener("pointerup",event=>{
  draggingNode = null;
  draggingStage = false;
  lastPoint = null;
  canvas.classList.remove("dragging");
  try{canvas.releasePointerCapture(event.pointerId)}catch(e){}
});

canvas.addEventListener("wheel",event=>{
  event.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const before = toWorld(event.clientX-rect.left,event.clientY-rect.top);
  const next = Math.min(1.8, Math.max(.55, scale * (event.deltaY < 0 ? 1.08 : .92)));
  scale = next;
  const after = toScreen(before.x,before.y);
  offsetX += (event.clientX-rect.left) - after.x;
  offsetY += (event.clientY-rect.top) - after.y;
  draw();
},{passive:false});

function activateView(view){
  document.querySelectorAll("[data-view]").forEach(btn=>btn.classList.toggle("active",btn.dataset.view===view));
  document.getElementById("graphView").classList.toggle("active",view==="graph");
  document.getElementById("mindView").classList.toggle("active",view==="mind");
  if(view==="graph") requestAnimationFrame(resize);
  if(view==="mind"){
    renderMindTermPanel();
    renderMind();
  }
}

document.querySelectorAll("[data-view]").forEach(btn=>{
  btn.addEventListener("click",()=>activateView(btn.dataset.view));
});

document.querySelectorAll("[data-mode]").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll("[data-mode]").forEach(b=>b.classList.toggle("active",b===btn));
    mode = btn.dataset.mode;
    if(!visibleNode(nodeById.get(selectedId))) selectedId = defaultNodeForMode();
    renderPanel(graphPanel);
    renderMindTermPanel();
    renderMind();
    draw();
  });
});

document.querySelectorAll("[data-mind-filter]").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll("[data-mind-filter]").forEach(b=>b.classList.toggle("active",b===btn));
    renderMind();
  });
});

searchInput.addEventListener("input",()=>{
  query = searchInput.value;
  renderMind();
  draw();
});
document.getElementById("clearSearch").addEventListener("click",()=>{
  searchInput.value = "";
  query = "";
  renderMind();
  draw();
});

window.addEventListener("resize",resize);
layout();
renderPanel(graphPanel);
renderMindTermPanel();
renderMind();
if(location.hash === "#mind") activateView("mind");
resize();
</script>
</body>
</html>
